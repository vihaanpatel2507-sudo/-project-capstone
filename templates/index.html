<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Event Registration</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Manrope:wght@500;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    body {
      min-height: 100vh;
      margin: 0;
      background: radial-gradient(circle at top left, #dbeafe, #fdfcf8 40%, #f3f0e8);
      font-family: "Instrument Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2933;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .page-wrapper {
      width: 100%;
      max-width: 1100px;
      padding: 24px;
    }
    .brand-logo {
      width: 46px;
      height: 46px;
      color: #01696f;
    }
    .card-main {
      border-radius: 1.5rem;
      border: none;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }
    .card-header-custom {
      background: linear-gradient(135deg, #01696f, #0891b2);
      color: #f9fafb;
    }
    .form-label {
      font-weight: 600;
      font-size: 0.9rem;
      color: #111827;
    }
    .form-control,
    .form-select {
      border-radius: 0.75rem;
    }
    .form-control:focus,
    .form-select:focus {
      border-color: #01696f;
      box-shadow: 0 0 0 0.15rem rgba(1, 105, 111, 0.18);
    }
    .btn-primary {
      background: #01696f;
      border-color: #01696f;
      border-radius: 999px;
      padding-inline: 24px;
      font-weight: 600;
    }
    .btn-primary:hover {
      background: #035761;
      border-color: #035761;
    }
    .btn-outline-secondary {
      border-radius: 999px;
    }
    #message {
      font-size: 0.9rem;
    }
    @media (max-width: 768px) {
      .card-main {
        border-radius: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="card card-main">
      <div class="card-header card-header-custom">
        <div class="d-flex flex-wrap align-items-center gap-3">
          <svg class="brand-logo" viewBox="0 0 64 64" fill="none" aria-label="CampusFlow logo">
            <rect x="6" y="8" width="52" height="48" rx="12" stroke="currentColor" stroke-width="4"></rect>
            <path d="M18 24L32 16L46 24L32 32L18 24Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"></path>
            <path d="M24 31V40C24 40 27 45 32 45C37 45 40 40 40 40V31" stroke="currentColor" stroke-width="4" stroke-linecap="round"></path>
          </svg>
          <div>
            <h1 class="h4 mb-0 fw-bold" style="font-family: 'Manrope', sans-serif;">
              Campus Event Registration
            </h1>
          </div>
        </div>
      </div>

      <div class="card-body p-3 p-md-4">
        <form id="registrationForm" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Full name *</label>
            <input
              required
              name="full_name"
              class="form-control"
              placeholder="Your name"
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">Student ID *</label>
            <input
              required
              name="student_id"
              class="form-control"
              placeholder="e.g. KU2507UXXXX"
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">Email *</label>
            <input
              required
              type="email"
              name="email"
              class="form-control"
              placeholder="example@gmail.com"
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">Phone *</label>
            <input
              required
              name="phone"
              class="form-control"
              placeholder="XXX-XXXXXXXX"
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">Department *</label>
            <select name="department" required class="form-select">
              <option value="">Select department</option>
              <option>Computer Engineering</option>
              <option>Electronics</option>
              <option>Mechanical</option>
              <option>Cyber</option>
              <option>MBA</option>
              <option>BCA</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Year / Semester *</label>
            <select name="year" required class="form-select">
              <option value="">Select year</option>
              <option>1st Year</option>
              <option>2nd Year</option>
              <option>3rd Year</option>
              <option>4th Year</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Event type *</label>
            <select name="event_type" required class="form-select">
              <option value="">Select type</option>
              <option>Workshop</option>
              <option>Hackathon</option>
              <option>Cultural</option>
              <option>Sports</option>
              <option>Seminar</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Event name *</label>
            <select name="event_name" required class="form-select">
              <option value="">Select event</option>
              <option>AI Bootcamp</option>
              <option>Robotics Challenge</option>
              <option>Startup Pitch</option>
              <option>Dance Fest</option>
              <option>Cricket Tournament</option>
              <option>Cybersecurity Seminar</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Registration category *</label>
            <select name="category" required class="form-select">
              <option>Individual</option>
              <option>Team</option>
              <option>Volunteer</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Team size</label>
            <input
              type="number"
              name="team_size"
              min="1"
              max="10"
              value="1"
              class="form-control"
            />
          </div>

          <div class="col-12">
            <label class="form-label">Special notes</label>
            <textarea
              name="notes"
              class="form-control"
              rows="3"
            ></textarea>
          </div>

          <div class="col-12">
            <div id="message" class="text-muted"></div>
          </div>

          <div class="col-12 d-flex justify-content-end gap-2">
            <button type="reset" class="btn btn-outline-secondary">
              Clear
            </button>
            <button type="submit" class="btn btn-primary">
              Submit registration
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>

  <script>
    const form = document.getElementById('registrationForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const fd = new FormData(form);
      const payload = Object.fromEntries(fd.entries());

      payload.team_size = Number(payload.team_size || 1);

      message.className = 'text-muted';
      message.textContent = 'Submitting registration...';

      try {
        const res = await fetch('/api/registrations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || 'Submission failed');
        }

        form.reset();
        message.className = 'text-success';
        message.textContent = `Registration saved successfully for ${data.full_name}.`;
      } catch (err) {
        message.className = 'text-danger';
        message.textContent = err.message;
      }
    });
  </script>
</body>
</html>
