<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Event Registration - Admin</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

  <style>
    body {
      min-height: 100vh;
      margin: 0;
      background: radial-gradient(circle at top left, #e0f2fe, #fdfcf8 40%, #f3f0e8);
      font-family: "Instrument Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2933;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .brand-logo {
      width: 42px;
      height: 42px;
      color: #01696f;
    }
    .hero,
    .card,
    .stat {
      border-radius: 1.25rem;
      border: none;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
      background: #ffffff;
    }
    .hero {
      padding: 20px 24px;
      margin-bottom: 20px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin: 20px 0;
    }
    .stat {
      padding: 18px;
    }
    .stat span {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .stat strong {
      font: 800 1.4rem "Manrope", sans-serif;
    }
    .grid {
      display: grid;
      gap: 20px;
    }
    .two {
      grid-template-columns: 1.1fr .9fr;
    }
    .card-head {
      padding: 20px 20px 0;
    }
    .card-head h3 {
      margin: 0;
      font: 800 1.1rem "Manrope", sans-serif;
    }
    .card-head p {
      margin: 6px 0 0;
      color: #6b7280;
      font-size: 0.9rem;
    }
    .card-body {
      padding: 20px;
    }
    .table-wrap {
      max-height: 520px;
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      vertical-align: top;
      font-size: 0.9rem;
    }
    th {
      position: sticky;
      top: 0;
      background: #f9fafb;
      z-index: 1;
      font-weight: 600;
    }
    .btn {
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .btn-main {
      background: #01696f;
      color: #fff;
      border-color: #01696f;
    }
    .btn-main:hover {
      background: #035761;
      border-color: #035761;
    }
    .btn.secondary {
      background: #edeae5;
      color: #111827;
      border: none;
    }
    .delete-btn {
      background: #fee2e2 !important;
      color: #991b1b !important;
    }
    .search {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid #d4d1ca;
      background: #f7f6f2;
      min-width: 260px;
      font-size: 0.9rem;
    }
    .muted {
      color: #6b7280;
      font-size: 0.8rem;
    }
    @media (max-width: 960px) {
      .two,
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-3">
      <div class="d-flex align-items-center gap-2">
        <svg class="brand-logo" viewBox="0 0 64 64" fill="none" aria-label="CampusFlow logo">
          <rect x="6" y="8" width="52" height="48" rx="12" stroke="currentColor" stroke-width="4"></rect>
          <path d="M18 24L32 16L46 24L32 32L18 24Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"></path>
          <path d="M24 31V40C24 40 27 45 32 45C37 45 40 40 40 40V31" stroke="currentColor" stroke-width="4" stroke-linecap="round"></path>
        </svg>
        <div>
          <h1 class="h5 mb-0 fw-bold" style="font-family: 'Manrope', sans-serif;">Campus Event Registration</h1>
          <p class="mb-0 muted">Admin dashboard</p>
        </div>
      </div>
    </header>

    <section class="hero">
      <h2 class="h5 mb-1 fw-bold" style="font-family: 'Manrope', sans-serif;">Admin Dashboard</h2>
      <p class="mb-0 muted">Monitor registrations, events, and records.</p>
    </section>

    <section class="stats">
      <div class="stat">
        <span>Total registrations</span>
        <strong id="totalCount">0</strong>
      </div>
    </section>

    <section class="grid two">
      <article class="card">
        <div class="card-head">
          <h3>Event trends</h3>
          <p>Registration totals per event.</p>
        </div>
        <div class="card-body">
          <canvas id="eventChart" height="170"></canvas>
        </div>
      </article>

      <article class="card">
        <div class="card-head">
          <h3>Registration records</h3>
          <p>Live view of all event registrations.</p>

          <div class="mt-2 d-flex gap-2 align-items-center flex-wrap">
            <input
              id="searchBox"
              class="search"
              type="text"
              placeholder="Search by name, event, department..."
            />
            <span id="searchInfo" class="muted"></span>
          </div>
        </div>
        <div class="card-body">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Event</th>
                  <th>Department</th>
                  <th>Time</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="recordsTable"></tbody>
            </table>
          </div>
        </div>
      </article>
    </section>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>

  <script>
    let registrations = [];
    const socket = io();

    const ctx = document.getElementById('eventChart').getContext('2d');
    const eventChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: [],
        datasets: [{
          label: 'Registrations',
          data: [],
          backgroundColor: '#01696f'
        }]
      },
      options: {
        scales: {
          y: {
            beginAtZero: true,
            ticks: { stepSize: 1 }
          }
        }
      }
    });

    const searchBox = document.getElementById('searchBox');
    const searchInfo = document.getElementById('searchInfo');

    async function loadAll() {
      const [rowsRes, statsRes] = await Promise.all([
        fetch('/api/registrations'),
        fetch('/api/stats')
      ]);

      registrations = await rowsRes.json();
      const stats = await statsRes.json();

      document.getElementById('totalCount').textContent = stats.total;

      applySearch();
      updateChart(registrations);
    }

    function updateChart(data) {
      const counts = {};
      data.forEach(r => {
        counts[r.event_name] = (counts[r.event_name] || 0) + 1;
      });

      const labels = Object.keys(counts);
      const values = Object.values(counts);

      const barColors = [
        '#01696f',
        '#0f766e',
        '#a12c7b',
        '#437a22',
        '#28251d',
        '#6e6b65',
        '#cedcd8'
      ];

      eventChart.data.labels = labels;
      eventChart.data.datasets[0].data = values;
      eventChart.data.datasets[0].backgroundColor = barColors.slice(0, labels.length);
      eventChart.update();
    }

    function renderRecords(data) {
      document.getElementById('recordsTable').innerHTML = data
        .map(r => {
          const date = new Date(r.created_at);
          return `
            <tr>
              <td>
                <strong>${r.full_name}</strong>
                <div class="muted">${r.student_id}</div>
              </td>
              <td>${r.event_name}</td>
              <td>${r.department}</td>
              <td>${date.toLocaleTimeString()}</td>
              <td>
                <button class="btn secondary delete-btn" onclick="deleteReg(${r.id})">
                  Delete
                </button>
              </td>
            </tr>
          `;
        })
        .join('');
    }

    function applySearch() {
      const q = (searchBox?.value || '').trim().toLowerCase();

      let filtered = registrations;

      if (q) {
        filtered = registrations.filter(r => {
          return (
            r.full_name.toLowerCase().includes(q) ||
            r.event_name.toLowerCase().includes(q) ||
            r.department.toLowerCase().includes(q) ||
            r.category.toLowerCase().includes(q) ||
            r.event_type.toLowerCase().includes(q)
          );
        });
      }

      renderRecords(filtered);

      if (!q) {
        searchInfo.textContent = '';
        return;
      }

      const byName = {};
      registrations.forEach(r => {
        const nameKey = r.full_name.toLowerCase();
        byName[nameKey] = (byName[nameKey] || 0) + 1;
      });

      const countForName = byName[q] || 0;

      if (countForName > 0) {
        searchInfo.textContent = `This person has ${countForName} registration(s).`;
      } else {
        searchInfo.textContent = `No exact name match. Showing partial matches.`;
      }
    }

    if (searchBox) {
      searchBox.addEventListener('input', () => {
        applySearch();
      });
    }

    async function deleteReg(id) {
      if (!confirm('Delete?')) return;
      await fetch(`/api/registrations/${id}`, { method: 'DELETE' });
      loadAll();
    }

    socket.on('registration:new', loadAll);
    socket.on('registration:deleted', loadAll);

    loadAll();
  </script>
</body>
</html>
