<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Event Registration </title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
  :root{
    --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
    --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
    --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
    --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
    --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
    --space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
    --color-bg:#fdfcf8;
    --color-surface:#ffffff;
    --color-surface-2:#f7f6f2;
    --color-surface-offset:#edeae5;
    --color-border:#d4d1ca;
    --color-divider:#dcd9d5;
    --color-text:#28251d;
    --color-text-muted:#6e6b65;
    --color-primary:#01696f;
    --color-primary-highlight:#cedcd8;
    --color-success:#437a22;
    --color-error:#a12c7b;
    --radius-md:.8rem;--radius-lg:1rem;--radius-xl:1.25rem;--radius-full:9999px;
    --shadow-sm:0 1px 2px rgba(30,30,30,.06);--shadow-md:0 12px 32px rgba(30,30,30,.08);
    --font-display:'Manrope',sans-serif;--font-body:'Instrument Sans',sans-serif
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;scroll-behavior:smooth}
  body{
    min-height:100vh;
    background:linear-gradient(135deg,#fdfcf8,#f3f0e8);
    color:var(--color-text);
    font:400 var(--text-base)/1.55 var(--font-body)
  }
  button,input,select,textarea{font:inherit}
  button{cursor:pointer}
  a{text-decoration:none;color:inherit}
  .page{max-width:1200px;margin:0 auto;padding:24px}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px}
  .brand{display:flex;gap:12px;align-items:center}
  .brand svg{width:42px;height:42px;color:var(--color-primary)}
  .brand h1{margin:0;font:800 var(--text-lg)/1.1 var(--font-display)}
  .brand p{margin:4px 0 0;color:var(--color-text-muted);font-size:var(--text-xs)}
  .actions{display:flex;gap:12px;flex-wrap:wrap}
  .btn{border:none;border-radius:var(--radius-full);padding:10px 16px;background:var(--color-primary);color:#fff;font-weight:700;font-size:var(--text-sm)}
  .btn.secondary{background:var(--color-surface-offset);color:var(--color-text)}
  .delete-btn{background:#f4d7df !important;color:#8a1f54 !important}
  .hero,.card,.stat{background:var(--color-surface);border:1px solid rgba(0,0,0,.06);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm)}
  .hero{padding:20px;margin-bottom:20px}
  .hero h2,.section-title{margin:0 0 8px;font:800 var(--text-xl)/1.1 var(--font-display)}
  .hero p,.sub{margin:0;color:var(--color-text-muted)}
  .grid{display:grid;gap:20px}
  .two{grid-template-columns:1.1fr .9fr}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:20px 0}
  .stat{padding:18px}
  .stat span{display:block;font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-muted);margin-bottom:6px}
  .stat strong{font:800 var(--text-xl)/1 var(--font-display)}
  .card-head{padding:20px 20px 0}
  .card-head h3{margin:0;font:800 var(--text-lg)/1.1 var(--font-display)}
  .card-head p{margin:8px 0 0;color:var(--color-text-muted);font-size:var(--text-sm)}
  .card-body{padding:20px}
  .table-wrap,.feed{max-height:480px;overflow:auto}
  .feed-item{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start;padding:14px 16px;border-bottom:1px solid var(--color-divider)}
  .pulse{width:12px;height:12px;border-radius:50%;background:var(--color-success);margin-top:5px;box-shadow:0 0 0 0 rgba(67,122,34,.45);animation:pulse 1.8s infinite}
  .tag{padding:6px 10px;border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:700;background:var(--color-primary-highlight);color:var(--color-primary)}
  @keyframes pulse{70%{box-shadow:0 0 0 12px rgba(67,122,34,0)}100%{box-shadow:0 0 0 0 rgba(67,122,34,0)}}
  table{width:100%;border-collapse:collapse}
  th,td{padding:14px 16px;border-bottom:1px solid var(--color-divider);text-align:left;vertical-align:top;font-size:var(--text-sm)}
  th{position:sticky;top:0;background:var(--color-surface);z-index:1}
  .search{padding:12px 14px;border-radius:var(--radius-full);border:1px solid var(--color-border);background:var(--color-surface-2);min-width:260px}
  .muted{color:var(--color-text-muted);font-size:var(--text-xs)}
  .detail-list{display:grid;gap:12px}
  .pill{display:inline-block;padding:6px 10px;border-radius:var(--radius-full);background:var(--color-surface-offset);font-size:var(--text-xs);margin:4px 6px 0 0}
  .success{color:var(--color-success);font-weight:700}
  .error{color:var(--color-error);font-weight:700}
  .note{font-size:var(--text-sm);color:var(--color-text-muted)}
  @media (max-width:960px){
    .two,.stats{grid-template-columns:1fr}
  }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand">
        <svg viewBox="0 0 64 64" fill="none" aria-label="CampusFlow logo">
          <rect x="6" y="8" width="52" height="48" rx="12" stroke="currentColor" stroke-width="4"></rect>
          <path d="M18 24L32 16L46 24L32 32L18 24Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"></path>
          <path d="M24 31V40C24 40 27 45 32 45C37 45 40 40 40 40V31" stroke="currentColor" stroke-width="4" stroke-linecap="round"></path>
        </svg>
        <div><h1>Campus Event Registration</h1></div>
      </div>
      </header>

    <section class="hero">
      <h2> Admin Dashboard</h2>
    </section>

    <section class="stats">
      <div class="stat"><span>Total registrations</span><strong id="totalCount">0</strong></div>
    </section>

    <section class="grid two">
      <article class="card">
        <div class="card-head"><h3>Event trends</h3><p>Registration totals per event.</p></div>
        <div class="card-body"><canvas id="eventChart" height="170"></canvas></div>
      </article>
      <article class="card">
        <div class="card-head"><h3>Live feed</h3><p>Newest activity appears first.</p></div>
        <div class="feed" id="liveFeed"></div>
      </article>
    </section>

    <section class="grid" style="margin-top:20px;">
      <article class="card">
        <div class="card-head"><h3>Registration records</h3><p>Connected live records view for all event entries.</p></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Name</th><th>Event</th><th>Department</th><th>Time</th><th>Action</th></tr>
            </thead>
            <tbody id="recordsTable"></tbody>
          </table>
        </div>
      </article>
    </section>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

  <script>
let registrations = [];
  const socket = io();

  const ctx = document.getElementById('eventChart').getContext('2d');
  const eventChart = new Chart(ctx, {
    type: 'bar',
    data: { labels: [], datasets: [{ label: 'Registrations', data: [], backgroundColor: '#01696f' }] },
    options: { scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
  });

  async function loadAll() {
    const [rowsRes, statsRes] = await Promise.all([fetch('/api/registrations'), fetch('/api/stats')]);
    registrations = await rowsRes.json();
    const stats = await statsRes.json();
    
    document.getElementById('totalCount').textContent = stats.total;
    renderRecords(registrations);
    renderFeed(registrations);
    updateChart(registrations);
  }

  function renderFeed(data) {
    const feed = document.getElementById('liveFeed');
    feed.innerHTML = data.slice(0, 5).map(r => {
      const date = new Date(r.created_at);
      // If it still looks wrong, you can manually adjust for the timezone offset:
      // const date = new Date(new Date(r.created_at).getTime() + (5.5 * 60 * 60 * 1000)); // Example for IST (+5:30)
      return `
      <div class="feed-item">
        <div class="pulse"></div>
        <div><strong>${r.full_name}</strong> registered for <strong>${r.event_name}</strong></div>
        <div class="muted">${date.toLocaleTimeString()}</div>
      </div>`;
    }).join('');
  }

  function updateChart(data) {
  const counts = {};
  data.forEach(r => counts[r.event_name] = (counts[r.event_name] || 0) + 1);
  
  const labels = Object.keys(counts);
  const values = Object.values(counts);

  // Define a list of different colors
  const barColors = [
    '#01696f', // Teal
    '#a12c7b', // Magenta/Error color
    '#437a22', // Green/Success color
    '#28251d', // Dark Text color
    '#6e6b65', // Muted Grey
    '#cedcd8'  // Light Highlight
  ];

  eventChart.data.labels = labels;
  eventChart.data.datasets[0].data = values;
  
  // Apply the array of colors to the dataset
  eventChart.data.datasets[0].backgroundColor = barColors.slice(0, labels.length);
  
  eventChart.update();
}

  function renderRecords(data) {
    document.getElementById('recordsTable').innerHTML = data.map(r => {
      const date = new Date(r.created_at);
      // If it still looks wrong, you can manually adjust for the timezone offset:
      // const date = new Date(new Date(r.created_at).getTime() + (5.5 * 60 * 60 * 1000)); // Example for IST (+5:30)
      return `
      <tr>
        <td><strong>${r.full_name}</strong><div class="muted">${r.student_id}</div></td>
        <td>${r.event_name}</td>
        <td>${r.department}</td>
        <td>${date.toLocaleTimeString()}</td>
        <td><button class="btn secondary delete-btn" onclick="deleteReg(${r.id})">Delete</button></td>
      </tr>`;
    }).join('');
  }

  async function deleteReg(id) {
    if(confirm('Delete?')) await fetch(`/api/registrations/${id}`, { method: 'DELETE' });
  }

  socket.on('registration:new', loadAll);
  socket.on('registration:deleted', loadAll);
  loadAll();
</script>
</body>
</html>
